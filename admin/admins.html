<!DOCTYPE html>
<html>

<head>
  <title>Admins Management</title>

  <script src="js/admins.js" defer></script>

  <style>
    :root {
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Roboto", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      width: 260px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: #fff;
      border-right: 1px solid var(--border);
      padding: 20px;
      z-index: 10;
    }

    .sidebar h2 {
      color: var(--primary);
      margin-bottom: 25px;
    }

    .sidebar a {
      display: block;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--muted);
      transition: 0.2s;
    }

    .sidebar a:hover {
      background: rgba(34, 197, 94, 0.12);
      color: var(--primary);
      transform: translateX(4px);
    }

    /* ================= MAIN ================= */
    .main {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ================= TOPBAR ================= */
    .topbar {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 18px 22px;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .topbar h2 {
      margin: 0;
      font-size: 20px;
    }

    /* ================= BUTTON ================= */
    .btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* ================= STATS ================= */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      width: 100%;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .stat-title {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 26px;
      font-weight: bold;
      color: var(--primary);
      margin-top: 8px;
    }

    /* ================= TABLE ================= */
    .table-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      overflow-x: auto;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 14px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    tr:hover {
      background: rgba(34, 197, 94, 0.06);
    }

    /* ================= RESPONSIVE ================= */
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .main {
        margin-left: 0;
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }

    /* ACTIVE SIDEBAR LINK */
    .sidebar a.active {
      background: rgba(34, 197, 94, 0.14);
      color: var(--primary);
      font-weight: 600;
      border-left: 4px solid var(--primary);
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>PSS Admin Panel</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="contacts.html">Contacts</a>
    <a href="quotes.html">Quotes</a>
    <a href="chatbot.html">Chatbot Logs</a>
    <a href="admins.html" class="active">Admins</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <h2>Admins Management</h2>
      <button class="btn" onclick="checkSuperPassword()">🔐 Unlock Admins</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="card">
        <div class="stat-title">Total Admins</div>
        <div class="stat-value" id="totalAdmins">0</div>
      </div>

      <div class="card">
        <div class="stat-title">Super Admins</div>
        <div class="stat-value" id="superAdmins">0</div>
      </div>

      <div class="card">
        <div class="stat-title">Active Today</div>
        <div class="stat-value" id="activeToday">0</div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Created At</th>
          </tr>
        </thead>

        <tbody id="adminsTable">
          <tr>
            <td colspan="4" style="text-align:center;color:#64748b;padding:20px;">
              Click "Unlock Admins" to view data
            </td>
          </tr>
        </tbody>

      </table>
    </div>

  </div>

</body>

</html>
