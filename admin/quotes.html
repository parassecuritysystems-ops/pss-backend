<!DOCTYPE html>
<html>

<head>
  <title>Quotes</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    /* =========================
   NEW BADGE
========================= */

    .new-badge {
      background: #ef4444;
      color: white;
      font-size: 10px;
      padding: 3px 7px;
      border-radius: 20px;
      margin-left: 8px;
      font-weight: 600;
    }

    /* =========================
   PAGINATION
========================= */

    .pagination {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .page-btn {
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      background: white;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: 0.2s;
    }

    .page-btn:hover {
      background: rgba(34, 197, 94, 0.1);
    }

    .active-page {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>PSS Admin Panel</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="contacts.html">Contacts</a>
    <a href="quotes.html" class="active">Quotes</a>
    <a href="chatbot.html">Chatbot Logs</a>
    <a href="admins.html">Admins</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Quote Requests</h2>
    </div>

    <div class="table-container">

      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Home/Business</th>
            <th>Industry</th>
            <th>Size</th>
            <th>Owner/Tenant</th>
            <th>System of Interest</th>
          </tr>
        </thead>

        <tbody id="quotesTable"></tbody>
      </table>

      <div id="pagination" class="pagination"></div>
    </div>

  </div>

  <script>
    // 🔐 Basic guard (prevents blank API calls)
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first");
      window.location.href = "login.html";
    }
  </script>

  <script src="js/quotes.js"></script>

</body>

</html>
