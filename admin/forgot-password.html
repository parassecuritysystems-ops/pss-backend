<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Forgot Password</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #65b530;
      --primary-dark: #4f8f25;

      --bg: #061a10;
      --card: rgba(255, 255, 255, 0.10);
      --border: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Roboto", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0c3d1f, #04140b);
      overflow: hidden;
      position: relative;
    }

    /* background glow */
    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      background: var(--primary);
      opacity: 0.15;
      border-radius: 50%;
      filter: blur(80px);
    }

    body::before {
      top: -120px;
      left: -120px;
    }

    body::after {
      bottom: -150px;
      right: -150px;
    }

    /* CARD */
    .login-container {
      width: 380px;
      padding: 32px;
      border-radius: 18px;
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      color: var(--text);
      text-align: center;
      z-index: 2;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    /* input */
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      outline: none;
      margin-bottom: 14px;
      transition: 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(101, 181, 48, 0.2);
    }

    /* button */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(101, 181, 48, 0.25);
    }

    /* helper text */
    .note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <div class="login-container">

    <h2>Forgot Password</h2>

    <input type="email" id="email" placeholder="Enter your email" required>

    <button class="btn" onclick="sendOTP()">Send OTP</button>

    <div class="note">
      We will send a verification code to your email
    </div>

  </div>

  <script src="js/forgot-password.js"></script>

</body>

</html>
